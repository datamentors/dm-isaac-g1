version: '3.8'

# DGX Spark — Full Workstation Environment (ARM64)
# Isaac Sim 5.1.0 + IsaacLab 2.3.0 + GR00T + MuJoCo + VNC desktop
#
# Usage:
#   docker compose build workstation
#   docker compose up -d workstation
#   docker exec -it dm-spark-workstation bash

services:
  workstation:
    build:
      context: .
      dockerfile: Dockerfile
      target: groot
    image: dm-spark-workstation:latest
    container_name: dm-spark-workstation
    runtime: nvidia
    network_mode: host
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - GROOT_MODEL_PATH=${GROOT_MODEL_PATH:-/workspace/checkpoints/groot-g1-gripper-hospitality-7ds}
      - GROOT_PORT=${GROOT_PORT:-5555}
      - GROOT_EMBODIMENT=${GROOT_EMBODIMENT:-UNITREE_G1}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY}
      - ACCEPT_EULA=Y
      - OMNI_KIT_ALLOW_ROOT=1
      - OMNI_KIT_ACCEPT_EULA=Y
      - MUJOCO_GL=egl
      - LD_PRELOAD=/lib/aarch64-linux-gnu/libgomp.so.1:/usr/lib/aarch64-linux-gnu/libopenblas.so.0
    volumes:
      # Live code repos (bind-mounted from host)
      - /home/nvidia/dm-isaac-g1:/workspace/dm-isaac-g1
      - /workspace/Isaac-GR00T:/workspace/Isaac-GR00T
      - /home/nvidia/unitree_sim_isaaclab:/workspace/unitree_sim_isaaclab

      # Data directories
      - /workspace/checkpoints:/workspace/checkpoints
      - /workspace/datasets:/workspace/datasets
      - /workspace/datasets_inspire:/workspace/datasets_inspire
      - /home/nvidia/HumanoidTraining:/workspace/HumanoidTraining

      # Caches (Docker volumes for persistence across rebuilds)
      - huggingface-cache:/workspace/.cache/huggingface
      - torch-cache:/workspace/.cache/torch
    shm_size: '64gb'
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "conda", "run", "-n", "unitree_sim_env", "python", "-c", "import torch; assert torch.cuda.is_available()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  huggingface-cache:
  torch-cache:
