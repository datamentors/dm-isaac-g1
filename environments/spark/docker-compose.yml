version: '3.8'

# DGX Spark — Full Workstation Environment
# Replaces inference-only docker-compose.yml with full training/eval/sim capabilities.
#
# Usage:
#   docker compose build workstation
#   docker compose up -d workstation
#   docker exec -it dm-spark-workstation bash

services:
  workstation:
    build:
      context: .
      dockerfile: Dockerfile
    image: dm-spark-workstation:latest
    container_name: dm-spark-workstation
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "5555:5555"   # GROOT ZMQ server
      - "8000:8000"   # HTTP API
      - "6006:6006"   # TensorBoard
      - "8080:8080"   # code-server (VS Code)
      - "8888:8888"   # JupyterLab
    volumes:
      # Live code repos (bind-mounted from host)
      - /home/nvidia/dm-isaac-g1:/workspace/dm-isaac-g1
      - /workspace/Isaac-GR00T:/workspace/Isaac-GR00T

      # Data directories
      - /workspace/checkpoints:/workspace/checkpoints
      - /workspace/datasets:/workspace/datasets
      - /workspace/datasets_inspire:/workspace/datasets_inspire
      - /home/nvidia/HumanoidTraining:/workspace/HumanoidTraining

      # Caches (Docker volumes for persistence across rebuilds)
      - huggingface-cache:/workspace/.cache/huggingface
      - torch-cache:/workspace/.cache/torch
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - GROOT_MODEL_PATH=${GROOT_MODEL_PATH:-/workspace/checkpoints/groot-g1-gripper-hospitality-7ds}
      - GROOT_PORT=${GROOT_PORT:-5555}
      - GROOT_EMBODIMENT=${GROOT_EMBODIMENT:-UNITREE_G1}
      - NVIDIA_VISIBLE_DEVICES=all
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - WANDB_API_KEY=${WANDB_API_KEY}
      - MUJOCO_GL=egl
    shm_size: '64gb'
    restart: unless-stopped
    # Keep container running for interactive use
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; assert torch.cuda.is_available()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  huggingface-cache:
  torch-cache:
